name: build

on:
  push:
  pull_request:

jobs:
  python:
    name: Tests and figures
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/

      - name: Generate all figures
        env:
          MPLBACKEND: Agg
        run: python code/generate_all_figures.py

      - name: Upload figures
        uses: actions/upload-artifact@v4
        with:
          name: figures
          path: code/figures/*.png

  latex:
    name: Slides and report
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compile Beamer slides
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: Seminar_Talk

      - name: Compile written report
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Summary.tex
          working_directory: Seminar_Talk/Summary

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: |
            Seminar_Talk/main.pdf
            Seminar_Talk/Summary/Summary.pdf
